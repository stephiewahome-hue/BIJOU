<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BIJOU — Admin</title>
  <style>
    :root {
      --rose:#c9737a; --rose-lt:#f7eced; --dark:#1a1014; --mid:#7a6068;
      --light:#fdf8f8; --white:#fff; --green:#4caf7d; --red:#e05c5c;
      --border:#eddfe0; --font-serif:'Georgia',serif;
      --font-sans:'Helvetica Neue',Arial,sans-serif;
      --radius:10px; --shadow:0 2px 16px rgba(180,100,110,.08);
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:var(--font-sans);background:var(--light);color:var(--dark);min-height:100vh}

    /* topbar */
    .topbar{background:var(--dark);color:#fff;display:flex;align-items:center;
      justify-content:space-between;padding:0 2rem;height:56px;position:sticky;top:0;z-index:100}
    .topbar-brand{font-family:var(--font-serif);font-size:1.25rem;letter-spacing:.18em;color:var(--rose)}
    .topbar-sub{font-size:.7rem;letter-spacing:.2em;text-transform:uppercase;color:#888}
    .topbar-actions{display:flex;gap:1rem;align-items:center}
    .topbar-link{font-size:.8rem;color:#aaa;text-decoration:none;border:1px solid #444;
      padding:6px 14px;border-radius:20px;transition:all .2s;cursor:pointer}
    .topbar-link:hover{color:#fff;border-color:var(--rose)}
    .topbar-link.logout{border-color:#c62828;color:#e05c5c}
    .topbar-link.logout:hover{background:#c62828;border-color:#c62828;color:#fff}

    /* layout */
    .layout{display:grid;grid-template-columns:320px 1fr;min-height:calc(100vh - 56px)}
    .sidebar{background:#fff;border-right:1px solid var(--border);padding:1.5rem;
      position:sticky;top:56px;height:calc(100vh - 56px);overflow-y:auto}
    .main{padding:1.5rem;overflow-y:auto}

    .sidebar-title{font-family:var(--font-serif);font-size:1.1rem;margin-bottom:1.25rem;
      padding-bottom:.75rem;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:.5rem}
    .sidebar-title span{color:var(--rose)}

    .form-group{margin-bottom:1rem}
    .form-group label{display:block;font-size:.72rem;font-weight:600;letter-spacing:.12em;
      text-transform:uppercase;color:var(--mid);margin-bottom:.4rem}
    .form-group input,.form-group select,.form-group textarea{
      width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:var(--radius);
      font-family:var(--font-sans);font-size:.9rem;color:var(--dark);background:var(--light);
      transition:border-color .2s;outline:none}
    .form-group input:focus,.form-group select:focus,.form-group textarea:focus{
      border-color:var(--rose);background:#fff}
    .form-group textarea{resize:vertical;min-height:60px}
    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:.75rem}

    /* upload */
    .upload-area{border:2px dashed var(--border);border-radius:var(--radius);padding:1.25rem;
      text-align:center;cursor:pointer;transition:all .2s;background:var(--light);position:relative}
    .upload-area:hover{border-color:var(--rose);background:var(--rose-lt)}
    .upload-area input[type="file"]{position:absolute;inset:0;opacity:0;cursor:pointer;
      width:100%;height:100%;border:none;padding:0}
    .upload-icon{font-size:1.6rem;margin-bottom:.3rem}
    .upload-text{font-size:.78rem;color:var(--mid)}
    .preview-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:.75rem}
    .preview-row img{width:72px;height:72px;object-fit:cover;border-radius:6px;
      border:1.5px solid var(--border)}

    .or-div{display:flex;align-items:center;gap:.5rem;margin:.75rem 0;
      font-size:.72rem;color:var(--mid);text-transform:uppercase;letter-spacing:.1em}
    .or-div::before,.or-div::after{content:'';flex:1;height:1px;background:var(--border)}

    /* buttons */
    .btn{display:inline-flex;align-items:center;justify-content:center;gap:.4rem;
      padding:11px 20px;border-radius:24px;font-size:.82rem;font-weight:600;
      letter-spacing:.08em;cursor:pointer;border:none;transition:all .2s;width:100%}
    .btn-primary{background:var(--rose);color:#fff}
    .btn-primary:hover{background:#b5622a}
    .btn-secondary{background:transparent;color:var(--mid);border:1.5px solid var(--border)}
    .btn-secondary:hover{border-color:var(--rose);color:var(--rose)}
    .btn:disabled{opacity:.5;cursor:not-allowed}
    .btn-row{display:flex;gap:.5rem;margin-top:1.25rem}

    .form-status{padding:10px 14px;border-radius:8px;font-size:.82rem;margin-bottom:1rem;display:none}
    .form-status.success{background:#e8f5ee;color:#2d7a50;display:block}
    .form-status.error{background:#fdeaea;color:var(--red);display:block}

    /* main */
    .main-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem}
    .main-title{font-family:var(--font-serif);font-size:1.1rem}
    .product-count{font-size:.75rem;color:var(--mid);background:var(--rose-lt);
      padding:4px 10px;border-radius:20px}

    .filter-tabs{display:flex;gap:.4rem;margin-bottom:1.25rem;flex-wrap:wrap}
    .ftab{padding:5px 14px;border-radius:20px;font-size:.75rem;font-weight:600;
      cursor:pointer;border:1.5px solid var(--border);background:#fff;color:var(--mid);transition:all .2s}
    .ftab.active,.ftab:hover{background:var(--rose);border-color:var(--rose);color:#fff}

    .product-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:1rem}
    .product-card{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);
      overflow:hidden;border:1.5px solid var(--border);transition:all .2s}
    .product-card:hover{box-shadow:0 4px 24px rgba(180,100,110,.14);border-color:var(--rose)}
    .product-card.editing{border-color:var(--rose);box-shadow:0 0 0 3px rgba(201,115,122,.18)}

    .card-img{width:100%;height:160px;object-fit:cover;display:block}
    .card-placeholder{width:100%;height:160px;background:var(--rose-lt);display:flex;
      align-items:center;justify-content:center;font-size:2rem}
    .card-body{padding:.85rem}
    .card-badge{display:inline-block;font-size:.62rem;font-weight:700;letter-spacing:.12em;
      text-transform:uppercase;background:var(--rose);color:#fff;padding:2px 8px;
      border-radius:20px;margin-bottom:.4rem}
    .card-cat{font-size:.68rem;text-transform:uppercase;letter-spacing:.1em;color:var(--mid);margin-bottom:.25rem}
    .card-name{font-size:.85rem;font-weight:600;margin-bottom:.4rem;line-height:1.3}
    .card-price{font-size:.9rem;font-weight:700;color:var(--rose)}
    .card-original{font-size:.75rem;color:var(--mid);text-decoration:line-through;margin-left:6px}
    .card-actions{display:flex;gap:.4rem;padding:0 .85rem .85rem}
    .card-btn{flex:1;padding:7px;border-radius:8px;font-size:.75rem;font-weight:600;
      cursor:pointer;border:1.5px solid var(--border);background:#fff;color:var(--mid);transition:all .2s}
    .card-btn:hover{border-color:var(--rose);color:var(--rose)}
    .card-btn.del:hover{border-color:var(--red);color:var(--red)}

    .state-msg{grid-column:1/-1;text-align:center;padding:4rem 2rem;color:var(--mid)}
    .state-msg .icon{font-size:2.5rem;margin-bottom:.75rem}

    .toast{position:fixed;bottom:2rem;right:2rem;background:var(--dark);color:#fff;
      padding:12px 20px;border-radius:10px;font-size:.82rem;transform:translateY(80px);
      opacity:0;transition:all .3s;z-index:9999;max-width:280px}
    .toast.show{transform:translateY(0);opacity:1}
    .toast.ok{background:var(--green)}
    .toast.err{background:var(--red)}

    .toggle-row{display:flex;align-items:center;justify-content:space-between;
      padding:10px 12px;border:1.5px solid var(--border);border-radius:var(--radius);background:var(--light)}
    .toggle{position:relative;width:38px;height:22px}
    .toggle input{opacity:0;width:0;height:0}
    .toggle-slider{position:absolute;inset:0;background:#ccc;border-radius:22px;cursor:pointer;transition:.3s}
    .toggle-slider:before{content:'';position:absolute;width:16px;height:16px;left:3px;bottom:3px;
      background:#fff;border-radius:50%;transition:.3s}
    .toggle input:checked+.toggle-slider{background:var(--green)}
    .toggle input:checked+.toggle-slider:before{transform:translateX(16px)}

    @media(max-width:768px){
      .layout{grid-template-columns:1fr}
      .sidebar{position:static;height:auto}
    }
  </style>
</head>
<body>

<div class="topbar">
  <div>
    <div class="topbar-brand">BIJOU</div>
    <div class="topbar-sub">Admin Panel</div>
  </div>
  <div class="topbar-actions">
    <a href="index.html" class="topbar-link">← View Store</a>
    <button onclick="logout()" class="topbar-link logout">🚪 Logout</button>
  </div>
</div>

<div class="layout">
  <!-- SIDEBAR FORM -->
  <aside class="sidebar">
    <div class="sidebar-title">
      <span id="formIcon">＋</span>
      <span id="formTitle">Add Product</span>
    </div>

    <div class="form-status" id="formStatus"></div>
    <input type="hidden" id="editId" />

    <div class="form-group">
      <label>Product Name *</label>
      <input type="text" id="fName" placeholder="e.g. Honey Blond Wig 28&quot;" />
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Category *</label>
        <select id="fCategory">
          <option value="">— pick one —</option>
          <option value="skincare">Skincare</option>
          <option value="makeup">Makeup</option>
          <option value="hair">Hair</option>
          <option value="fashion">Fashion</option>
        </select>
      </div>
      <div class="form-group">
        <label>Badge</label>
        <select id="fBadge">
          <option value="">None</option>
          <option value="new">New</option>
          <option value="sale">Sale</option>
          <option value="hot">Hot</option>
          <option value="limited">Limited</option>
        </select>
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Price (KSh) *</label>
        <input type="number" id="fPrice" placeholder="8500" min="0" />
      </div>
      <div class="form-group">
        <label>Original Price</label>
        <input type="number" id="fOriginal" placeholder="11000" min="0" />
      </div>
    </div>

    <div class="form-group">
      <label>Description</label>
      <textarea id="fDescription" placeholder="Product details, size, colour..." rows="3"></textarea>
    </div>

    <div class="form-group">
      <label>Upload Photo(s)</label>
      <div class="upload-area">
        <input type="file" id="fFiles" accept="image/*" multiple onchange="previewFiles(event)" />
        <div class="upload-icon">📷</div>
        <div class="upload-text">Click to upload (multiple allowed)</div>
        <div class="preview-row" id="filePreview"></div>
      </div>
    </div>

    <div class="or-div">or paste image URL(s)</div>

    <div class="form-group">
      <textarea id="fUrls" placeholder="https://... (one URL per line)" rows="3"
        oninput="previewUrls(this.value)"></textarea>
      <div class="preview-row" id="urlPreview"></div>
    </div>

    <div class="form-group">
      <div class="toggle-row">
        <span style="font-size:.85rem">In Stock</span>
        <label class="toggle">
          <input type="checkbox" id="fInStock" checked />
          <span class="toggle-slider"></span>
        </label>
      </div>
    </div>

    <div class="btn-row">
      <button class="btn btn-primary" id="submitBtn" onclick="submitProduct()">＋ Add Product</button>
      <button class="btn btn-secondary" id="cancelBtn" onclick="resetForm()"
        style="display:none;width:auto;padding:11px 16px">✕</button>
    </div>
  </aside>

  <!-- MAIN GRID -->
  <main class="main">
    <div class="main-header">
      <div class="main-title">All Products</div>
      <div class="product-count" id="productCount">Loading...</div>
    </div>
    <div class="filter-tabs">
      <button class="ftab active" onclick="filterCat(this,'')">All</button>
      <button class="ftab" onclick="filterCat(this,'skincare')">Skincare</button>
      <button class="ftab" onclick="filterCat(this,'makeup')">Makeup</button>
      <button class="ftab" onclick="filterCat(this,'hair')">Hair</button>
      <button class="ftab" onclick="filterCat(this,'fashion')">Fashion</button>
    </div>
    <div class="product-grid" id="productGrid">
      <div class="state-msg"><div class="icon">⏳</div><p>Loading products...</p></div>
    </div>
  </main>
</div>

<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════════════════════
// AUTH CHECK
// ═══════════════════════════════════════════════════════════
function checkAuth() {
  const token = sessionStorage.getItem('adminToken');
  if (!token) {
    window.location.href = 'admin-login.html';
  }
}

function logout() {
  sessionStorage.removeItem('adminToken');
  window.location.href = 'admin-login.html';
}

checkAuth();

// ═══════════════════════════════════════════════════════════
// PRODUCT MANAGEMENT
// ═══════════════════════════════════════════════════════════
const API = window.location.protocol === 'file:'
  ? 'http://localhost:3000'
  : window.location.origin;
let allProducts = [];
let currentCat  = '';

function getAuthHeaders() {
  const token = sessionStorage.getItem('adminToken');
  return {
    'Authorization': 'Bearer ' + token,
    'Content-Type': 'application/json'
  };
}

/* ── LOAD PRODUCTS ── */
async function loadProducts() {
  try {
    const url  = currentCat ? `${API}/api/products?category=${currentCat}` : `${API}/api/products`;
    const res  = await fetch(url);
    const data = await res.json();
    if (!data.success) throw new Error(data.message);
    allProducts = data.products;
    renderGrid(allProducts);
    document.getElementById('productCount').textContent =
      allProducts.length + ' product' + (allProducts.length !== 1 ? 's' : '');
  } catch(e) {
    document.getElementById('productGrid').innerHTML = `
      <div class="state-msg">
        <div class="icon">⚠️</div>
        <p>Cannot connect to server.<br><strong>${e.message}</strong><br>
        Make sure <strong>node server.js</strong> is running then refresh.</p>
      </div>`;
    document.getElementById('productCount').textContent = 'offline';
  }
}

/* ── RENDER GRID ── */
function renderGrid(products) {
  const grid = document.getElementById('productGrid');
  if (!products.length) {
    grid.innerHTML = '<div class="state-msg"><div class="icon">📦</div><p>No products yet. Add one!</p></div>';
    return;
  }
  grid.innerHTML = products.map(p => {
    const img = (p.imageUrls && p.imageUrls[0]) || p.imageUrl || '';
    const thumb = img
      ? `<img class="card-img" src="${img}" alt="${p.name}"
             onerror="this.style.display='none';this.nextSibling.style.display='flex'" />
         <div class="card-placeholder" style="display:none">✨</div>`
      : `<div class="card-placeholder">✨</div>`;
    const nameEsc = p.name.replace(/'/g,"\\'" );
    return `
      <div class="product-card" id="card-${p.id}">
        ${thumb}
        <div class="card-body">
          ${p.badge ? `<div class="card-badge">${p.badge}</div>` : ''}
          <div class="card-cat">${p.category || '—'}</div>
          <div class="card-name">${p.name}</div>
          <div>
            <span class="card-price">KSh ${Number(p.price).toLocaleString()}</span>
            ${p.original ? `<span class="card-original">KSh ${Number(p.original).toLocaleString()}</span>` : ''}
          </div>
        </div>
        <div class="card-actions">
          <button class="card-btn" onclick="editProduct('${p.id}')">✏️ Edit</button>
          <button class="card-btn del" onclick="deleteProduct('${p.id}','${nameEsc}')">🗑️ Delete</button>
        </div>
      </div>`;
  }).join('');
}

/* ── FILTER ── */
function filterCat(el, cat) {
  document.querySelectorAll('.ftab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  currentCat = cat;
  loadProducts();
}

/* ── IMAGE PREVIEWS ── */
function previewFiles(e) {
  const container = document.getElementById('filePreview');
  container.innerHTML = '';
  Array.from(e.target.files).forEach(file => {
    const r = new FileReader();
    r.onload = ev => {
      const img = document.createElement('img');
      img.src = ev.target.result;
      container.appendChild(img);
    };
    r.readAsDataURL(file);
  });
  document.getElementById('fUrls').value = '';
  document.getElementById('urlPreview').innerHTML = '';
}

function previewUrls(raw) {
  const container = document.getElementById('urlPreview');
  container.innerHTML = '';
  raw.split(/\n/).map(u => u.trim()).filter(Boolean).forEach(url => {
    const img = document.createElement('img');
    img.src = url;
    img.onerror = () => img.style.display = 'none';
    container.appendChild(img);
  });
  document.getElementById('fFiles').value = '';
  document.getElementById('filePreview').innerHTML = '';
}

/* ── SUBMIT ── */
async function submitProduct() {
  const id          = document.getElementById('editId').value;
  const name        = document.getElementById('fName').value.trim();
  const category    = document.getElementById('fCategory').value;
  const price       = document.getElementById('fPrice').value;
  const original    = document.getElementById('fOriginal').value;
  const badge       = document.getElementById('fBadge').value;
  const description = document.getElementById('fDescription').value.trim();
  const inStock     = document.getElementById('fInStock').checked;
  const urls        = document.getElementById('fUrls').value.trim();
  const files       = document.getElementById('fFiles').files;

  if (!name)     return showStatus('Product name is required','error');
  if (!category) return showStatus('Please select a category','error');
  if (!price)    return showStatus('Price is required','error');

  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.textContent = 'Saving...';

  try {
    const fd = new FormData();
    fd.append('name',        name);
    fd.append('category',    category);
    fd.append('price',       price);
    fd.append('original',    original);
    fd.append('badge',       badge);
    fd.append('description', description);
    fd.append('inStock',     String(inStock));

    if (files && files.length) {
      Array.from(files).forEach(f => fd.append('images', f));
    } else if (urls) {
      fd.append('imageUrls', urls);
    }

    const token = sessionStorage.getItem('adminToken');
    const method = id ? 'PUT' : 'POST';
    const url    = id ? `${API}/api/products/${id}` : `${API}/api/products`;
    const res    = await fetch(url, {
      method,
      body: fd,
      headers: { 'Authorization': 'Bearer ' + token }
    });
    const data   = await res.json();

    if (data.success) {
      showToast(id ? '✅ Product updated!' : '✅ Product added!', 'ok');
      resetForm();
      loadProducts();
    } else {
      showStatus(data.message || 'Something went wrong','error');
    }
  } catch(e) {
    showStatus('Could not connect to server: ' + e.message, 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = document.getElementById('editId').value ? '💾 Save Changes' : '＋ Add Product';
  }
}

/* ── EDIT ── */
function editProduct(id) {
  const p = allProducts.find(x => x.id === id);
  if (!p) return;

  document.getElementById('editId').value      = id;
  document.getElementById('fName').value       = p.name || '';
  document.getElementById('fCategory').value   = p.category || '';
  document.getElementById('fPrice').value      = p.price || '';
  document.getElementById('fOriginal').value   = p.original || '';
  document.getElementById('fBadge').value      = p.badge || '';
  document.getElementById('fDescription').value= p.description || '';
  document.getElementById('fInStock').checked  = p.inStock !== false;
  document.getElementById('fFiles').value      = '';
  document.getElementById('filePreview').innerHTML = '';

  const imgs = p.imageUrls && p.imageUrls.length ? p.imageUrls : (p.imageUrl ? [p.imageUrl] : []);
  const nonBase64 = imgs.filter(u => !u.startsWith('data:'));
  document.getElementById('fUrls').value = nonBase64.join('\n');
  previewUrls(nonBase64.join('\n'));

  document.getElementById('formTitle').textContent   = 'Edit Product';
  document.getElementById('formIcon').textContent    = '✏️';
  document.getElementById('submitBtn').textContent   = '💾 Save Changes';
  document.getElementById('cancelBtn').style.display = 'inline-flex';

  document.querySelectorAll('.product-card').forEach(c => c.classList.remove('editing'));
  const card = document.getElementById('card-' + id);
  if (card) { card.classList.add('editing'); card.scrollIntoView({ behavior:'smooth', block:'nearest' }); }
  document.querySelector('.sidebar').scrollIntoView({ behavior:'smooth' });
  showStatus('Editing: ' + p.name, 'success');
}

/* ── DELETE ── */
async function deleteProduct(id, name) {
  if (!confirm(`Delete "${name}"?\nThis cannot be undone.`)) return;
  try {
    const token = sessionStorage.getItem('adminToken');
    const res  = await fetch(`${API}/api/products/${id}`, {
      method:'DELETE',
      headers: { 'Authorization': 'Bearer ' + token }
    });
    const data = await res.json();
    if (data.success) { showToast('🗑️ Deleted: ' + name, 'err'); loadProducts(); }
  } catch(e) { showToast('Delete failed', 'err'); }
}

/* ── RESET ── */
function resetForm() {
  ['editId','fName','fPrice','fOriginal','fDescription','fUrls'].forEach(id =>
    document.getElementById(id).value = '');
  document.getElementById('fCategory').value  = '';
  document.getElementById('fBadge').value     = '';
  document.getElementById('fInStock').checked = true;
  document.getElementById('fFiles').value     = '';
  document.getElementById('filePreview').innerHTML = '';
  document.getElementById('urlPreview').innerHTML  = '';
  document.getElementById('formTitle').textContent   = 'Add Product';
  document.getElementById('formIcon').textContent    = '＋';
  document.getElementById('submitBtn').textContent   = '＋ Add Product';
  document.getElementById('cancelBtn').style.display = 'none';
  document.getElementById('formStatus').className    = 'form-status';
  document.getElementById('formStatus').textContent  = '';
  document.querySelectorAll('.product-card').forEach(c => c.classList.remove('editing'));
}

/* ── HELPERS ── */
function showStatus(msg, type) {
  const el = document.getElementById('formStatus');
  el.textContent = msg; el.className = 'form-status ' + type;
}
function showToast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast show ' + type;
  setTimeout(() => t.className = 'toast', 3500);
}

loadProducts();
</script>
</body>
</html>
